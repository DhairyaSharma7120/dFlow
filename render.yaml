services:
  - type: web
    name: dflow-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
